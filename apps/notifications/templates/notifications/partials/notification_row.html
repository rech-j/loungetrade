{% load notification_tags %}
<div class="notif-row px-4 py-3 {% if not n.is_read %}border-l-3 border-l-gold{% else %}opacity-60{% endif %}" data-notif-id="{{ n.pk }}">
    <div class="flex items-start justify-between gap-4">
        <div class="flex-1">
            {% if n.link %}
            <a href="{{ n.link }}" class="text-sm font-venus-medium hover:text-gold">
                <span class="notif-icon mr-1">{{ n.notif_type|notif_icon }}</span>{{ n.title }}
            </a>
            {% else %}
            <p class="text-sm font-venus-medium">
                <span class="notif-icon mr-1">{{ n.notif_type|notif_icon }}</span>{{ n.title }}
            </p>
            {% endif %}
            <p class="text-sm text-slate mt-0.5">{{ n.message }}</p>
            <p class="text-xs text-slate mt-1">{{ n.created_at|timesince }} ago</p>
        </div>
        <div class="flex items-center gap-2.5 flex-shrink-0 mt-0.5">
            {% if not n.is_read %}
            <form method="post" action="{% url 'notification_mark_read' n.pk %}" class="notif-mark-read">
                {% csrf_token %}
                <button type="submit"
                        class="w-2.5 h-2.5 rounded-full bg-gold ring-2 ring-offset-1 ring-transparent hover:ring-gold/50 dark:ring-offset-walnut transition-all"
                        title="Mark as read"
                        hx-post="{% url 'notification_mark_read' n.pk %}"
                        hx-target="closest .notif-row"
                        hx-swap="outerHTML"></button>
            </form>
            {% endif %}
            <form method="post" action="{% url 'notification_delete' n.pk %}">
                {% csrf_token %}
                <button type="submit"
                        class="text-stone dark:text-slate hover:text-burgundy transition-colors"
                        title="Delete notification"
                        hx-post="{% url 'notification_delete' n.pk %}"
                        hx-target="closest .notif-row"
                        hx-swap="outerHTML"
                        hx-confirm="Delete this notification?">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </form>
        </div>
    </div>
</div>
