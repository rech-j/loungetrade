# Rate limiting zones - applied before requests reach Django.
# General requests: 10 req/s per IP with burst of 20 (queued, not rejected).
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
# Login/signup: 5 req/s per IP - tighter to slow credential stuffing.
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

server {
    listen 80;
    server_name loungecoin.trade www.loungecoin.trade;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name loungecoin.trade www.loungecoin.trade;

    # SSL managed by Certbot
    ssl_certificate /etc/letsencrypt/live/loungecoin.trade/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/loungecoin.trade/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 5M;

    # Compression
    gzip on;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json;
    gzip_min_length 1000;
    gzip_vary on;

    # Security headers
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header X-Content-Type-Options "nosniff" always;

    location /static/ {
        alias /var/www/loungecoin/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /var/www/loungecoin/media/;
        expires 7d;
    }

    location /favicon.ico {
        alias /var/www/loungecoin/staticfiles/favicon/favicon.ico;
        expires 30d;
        access_log off;
    }

    location /ws/ {
        proxy_pass http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Tighter rate limit on auth endpoints to slow credential stuffing.
    location ~ ^/accounts/(login|signup|password/reset)/ {
        limit_req zone=auth burst=10 nodelay;
        proxy_pass http://unix:/var/www/loungecoin/gunicorn.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://unix:/var/www/loungecoin/gunicorn.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
